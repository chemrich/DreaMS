# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Build entirely with uv (the project's package manager). `build.commands` takes
# full control of the build: install uv, sync the `docs` extra from the lockfile,
# generate API stubs, and emit HTML to $READTHEDOCS_OUTPUT.
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - pip install uv
    - uv sync --extra docs
    - uv run sphinx-apidoc -o ./docs ./dreams
    - uv run sphinx-build -b html docs $READTHEDOCS_OUTPUT/html
