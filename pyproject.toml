[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dreams"
version = "1.0.0"
description = "DreaMS (Deep Representations Empowering the Annotation of Mass Spectra)"
readme = "README.md"
license = "MIT"
authors = [{ name = "DreaMS developers" }]
requires-python = ">=3.13"
classifiers = [
    # NB: no `License ::` classifier — superseded by the SPDX `license` field above
    # under PEP 639 (setuptools>=77 rejects having both).
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]

# NOTE: pins were raised from the legacy `==` freeze to the lowest floors that
# ship cp313/cp314 wheels. `>=` (not `==`) so security/compat fixes flow in;
# the reproducible build is captured separately in a lockfile (uv.lock /
# pip-compile'd requirements), not here.
dependencies = [
    "numpy>=2.1",            # NumPy 2.x — major API break vs the old 1.25 pin
    "numba>=0.63",           # 0.63 added Python 3.14 support (0.66 recommended)
    "torch>=2.9",            # first line with cp314 wheels (CPU; CUDA cp314 pending upstream)
    "pytorch-lightning>=2.4",
    "torchmetrics>=1.6",
    "pandas>=2.2.3",
    "pyarrow>=18.0",
    "h5py>=3.12",
    "rdkit>=2026.3.3",       # first release with cp314 wheels
    "umap-learn>=0.5.6",
    "scikit-learn>=1.6",     # old `<1.6` cap blocked 3.13/3.14-era builds
    "seaborn>=0.13.2",
    "plotly>=5.20.0",
    "ase>=3.22.1",
    "wandb>=0.17",
    "pandarallel>=1.6.5",
    "matchms>=0.27.0",
    "pyopenms>=3.5.0",       # 3.5 ships cp314 wheels on all OSes — kills the setup.py platform hack
    "igraph>=0.11.4",
    "molplotly>=1.1.7",
    "fire>=0.6.0",
    "huggingface_hub>=0.33.5",
    # Git deps pinned to immutable commits (was `@main` — non-reproducible).
    # AUDIT: this "legacy architectures" package is the most likely upgrade
    # blocker; it may itself constrain torch/numpy. Fork/vendor if it won't resolve.
    "msml @ git+https://github.com/roman-bushuiev/msml_legacy_architectures.git@d35b34b0caee38348098cda852bff30d8b25cd25",
]

[project.urls]
Homepage = "https://github.com/pluskal-lab/DreaMS"
Paper = "https://www.nature.com/articles/s41587-025-02663-3"
Documentation = "https://dreams-docs.readthedocs.io/"

[project.scripts]
dreams = "dreams.cli:main"

[project.optional-dependencies]
dev = [
    "ruff>=0.6",             # replaces black (lint + format in one tool)
    "pytest>=8.2.1",
    "pytest-cov>=5.0.0",
    "Cython>=3.0.9",         # build-time dep for the SpectralEntropy git package below
    "SpectralEntropy @ git+https://github.com/YuanyueLi/SpectralEntropy@a1151cfcd9adc66e46f95fb3b06a660e1b0c9b56#egg=SpectralEntropy",
]
notebooks = [
    "jupyter>=1.0.0",
    "ipywidgets>=8.1.3",
]
docs = [
    "sphinx>=7.4.7",
    "sphinx-rtd-theme>=2.0.0",
    "nbsphinx>=0.9.4",
    "m2r2>=0.3.3.post2",
    "lxml_html_clean>=0.2.2",
]

[tool.setuptools.packages.find]
include = ["dreams*"]

[tool.ruff]
line-length = 100
target-version = "py313"
# Notebooks and one-off scripts aren't library code — linting them is noise.
# Bring them under lint in a dedicated pass later.
extend-exclude = ["experiments", "tutorials", "docs", "*.ipynb"]

[tool.ruff.lint]
# Start lenient so lint can be turned on in CI without a huge upfront cleanup;
# tighten (add "I" import-sort, "UP" pyupgrade, "B" bugbear) as the codebase is modernized.
select = ["E", "F", "W"]
# Enforced now (all mechanically fixable): F401 unused imports, F541 empty
# f-strings, W29x whitespace. Ignored below are structural/legacy-debt rules that
# need manual refactoring — tracked as Phase 2 cleanup, not day-one blockers:
ignore = [
    "E501",  # line too long
    "E402",  # import not at top — the deliberate `warnings.filterwarnings` prelude in api.py
    "E701",  # multiple statements on one line
    "E713",  # `not ... in` test
    "E721",  # type comparison with `==`
    "E741",  # ambiguous var name (e.g. `l`)
    "F403",  # `import *`
    "F405",  # name may be from `import *`
    "F811",  # redefinition (mostly wildcard-import shadowing)
    "F821",  # undefined name (ruff can't resolve wildcard-imported names)
    "F841",  # unused local variable
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
markers = [
    "slow: tests that download model weights or datasets (deselect with -m 'not slow')",
]

[tool.coverage.run]
source = ["dreams"]
omit = ["dreams/training/*", "experiments/*"]
