name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # ruff and mypy run as isolated tools (`uv tool run`), i.e. WITHOUT the
      # project's dependencies. mypy relies on this: a full env would make it load
      # rdkit's broken bundled stubs. Versions match .pre-commit-config.yaml.
      - name: Ruff lint
        run: uv tool run ruff@0.15.21 check .
      # `ruff format --check` is intentionally deferred: applying it repo-wide is a
      # large mechanical diff that belongs in its own PR. Add it here once done.
      - name: Mypy
        run: uv tool run mypy@2.2.0

  test:
    name: test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # gpu-cuda branch: 3.13 only (requires-python <3.14 — CUDA has no cp314
        # wheels). Note: CI runners are CPU-only, so on Linux this installs the
        # heavy +cu126 torch but only exercises the CPU code paths; GPU is
        # validated separately via dreams/training/smoke_test.sh on a real GPU VM.
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Exact, locked env from uv.lock. torch resolves to the CPU build on Linux
      # via [tool.uv.sources] (no CUDA cp314 wheel exists); macOS uses its PyPI
      # CPU/MPS wheel. --locked fails if the lock is stale vs pyproject.toml.
      - name: Sync (locked)
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        # Skip `slow` tests (they download model weights / datasets from HF).
        run: uv run pytest -m "not slow" --cov --cov-report=term-missing
