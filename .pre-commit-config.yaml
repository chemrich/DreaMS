# Install once:  pip install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files
# Bump pins:     pre-commit autoupdate
#
# ruff/ruff-format use the config in pyproject.toml [tool.ruff]; mypy uses
# [tool.mypy]. Keep these revs in sync with the `dev` extra in pyproject.toml.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      # Lint (autofix). Runs on changed files only — fast.
      - id: ruff
        args: [--fix]
      # Format. Only touches files you stage, so no repo-wide reformat churn —
      # this is how the deferred `ruff format` rolls out incrementally.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        # Check the whole `dreams` package via [tool.mypy] (files + overrides),
        # not just staged files — needed for follow_imports and the quarantine
        # list to behave correctly.
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.ipynb$'
